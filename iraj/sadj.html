<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farben ändern</title>

<style>
.main{
    background-color: blue;
    width: 80%;
    height: 80vh;
    display: flex;
    margin: 5vh 10%;
}

table{
    width: 100%;
    border-radius: 20px;
    border:25px solid blue;
}

td{
    background-color: rgb(85, 42, 165);
    height: 30%;
    border: 10px solid blue;
    text-align: center;
}

button{
    margin:5px;
    padding:5px 10px;
}
</style>



</head>
<body>

<div class="main">
<table>
<tr>
    <td>
        <button onclick="farbeAendern(1,'red')">Rot</button>
        <button onclick="farbeAendern(1,'blue')">Blau</button>
    </td>
    <td>
        <button onclick="farbeAendern(2,'red')">Rot</button>
        <button onclick="farbeAendern(2,'blue')">Blau</button>
    </td>
    <td>
        <button onclick="farbeAendern(3,'red')">Rot</button>
        <button onclick="farbeAendern(3,'blue')">Blau</button>
    </td>
</tr>
<tr>
    <td>
        <button onclick="farbeAendern(4,'red')">Rot</button>
        <button onclick="farbeAendern(4,'blue')">Blau</button>
    </td>
    <td>
        <button onclick="farbeAendern(5,'red')">Rot</button>
        <button onclick="farbeAendern(5,'blue')">Blau</button>
    </td>
    <td>
        <button onclick="farbeAendern(6,'red')">Rot</button>
        <button onclick="farbeAendern(6,'blue')">Blau</button>
    </td>
</tr>
<tr>
    <td>
        <button onclick="farbeAendern(7,'red')">Rot</button>
        <button onclick="farbeAendern(7,'blue')">Blau</button>
    </td>
    <td>
        <button onclick="farbeAendern(8,'red')">Rot</button>
        <button onclick="farbeAendern(8,'blue')">Blau</button>
    </td>
    <td>
        <button onclick="farbeAendern(9,'red')">Rot</button>
        <button onclick="farbeAendern(9,'blue')">Blau</button>
    </td>
</tr>
</table>
</div>
<script>

let feldava = [1,2,3,4,5,6,7,8,9];

function farbeAendern(buttonNummer, farbe){

    let felder = document.querySelectorAll("td");
    let feld = felder[buttonNummer - 1];

    feld.style.backgroundColor = farbe;

    // 🔥 Buttons im geklickten Feld entfernen
    let buttons = feld.querySelectorAll("button");
    buttons.forEach(button => button.remove());

    // Zahl aus Array entfernen
    feldava = feldava.filter(n => n !== buttonNummer);

    console.log("Verfügbare Felder:", feldava);
}
</script>
</body>
</html>
