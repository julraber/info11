<html lang="de">

                    document.getElementById("content-area").innerHTML = data;
                });
        }
    </script>
</head>

<body>
    <header>
        <h1>Ascend Aesthetics</h1>
        <nav>
            <button onclick="loadPage('./home.html')">Home</button>

            <button onclick="loadPage('./programme.html')">Programm</button>
            <button onclick="loadPage('./kontakt.html')">Kontakt</button>
        </nav>
    </header>

    <main id="content-area">
        <section class="hero">
            <h2>Optimiere dein Potenzial</h2>
            <p>
                Professionelle Programme für Fitness,
                Style und Selbstverbesserung.
            </p>
            <img src="clav.jpg" alt="Transformation Bild">
        </section>
    </main>

    <footer>
        <p>2026 Ascend Aesthetics | <a href="javascript:void(0)" onclick="loadPage('./kontakt.html')"
                class="footer-link">Kontakt</a> </p>
    </footer>
</body>

</html>
