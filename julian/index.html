<!DOCTYPE html>
	<html>

			<body>
				<div id="obenlinks"><a href="interaktivewebsite.html"><img src="kibild.jpg" width="100%" height="100%"></a></div>
				<div id="obenmitte"><div>Seite für viele geniale Ideen</div></div>

				<div id="untengross">Willkommmen auf dieser Website. <br>

					<img id="baum" src="baum-neu.jpg" width="80%">

				<script>
							function Seiteladen(datei)	{
									fetch(datei)
									.then(antwort=> antwort.text())
									.then(inhalt=> {
										document.getElementById("untengross").innerHTML=inhalt;
										})
										
									.catch(error=>
										{document.getElementById("untenmitte").innerHTML = "<p>Fehler beim Laden der Seite.</p>";
											console.error(error);
										});
							}
				</script>
			
			</body>
